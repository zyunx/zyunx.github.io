<!DOCTYPE html>
<html>
  {% include head.html %}
  <body>
    {% include header.html %}

    <ul>
    {% for page in site.pages %}
        {% if page.title %}
        <li class="page-li">
          <a class="page-link" href="{{ page.url | prepend: site.baseurl }}">{{ page.title | escape }}</a>
        {% endif %}
        </li>
    {% endfor %}
    </ul>

{{ content }}

    {% include footer.html %}
  </body>
</html>
